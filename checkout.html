<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout | Green Leaf Kitchen</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#1A1A2E',
                        'accent': '#E94560',
                        'muted': '#6B7280',
                        'success': '#059669',
                        'border': '#E5E7EB',
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #F8F4F0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .form-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1A1A2E;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            background: #FAFAFA;
        }
        .form-input:focus {
            outline: none;
            border-color: #E94560;
            background: white;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }
        .form-input::placeholder { color: #9CA3AF; }

        /* OTP Input Styling */
        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }
        .otp-input {
            width: 50px;
            height: 55px;
            border: 1.5px solid #E5E7EB;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            background: #FAFAFA;
            transition: all 0.2s;
        }
        .otp-input:focus {
            border-color: #E94560;
            background: white;
            outline: none;
        }

        .send-otp-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #E94560;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-otp-btn:disabled { background: #D1D5DB; cursor: not-allowed; }
        .send-otp-btn:hover { opacity: 0.9; }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #E94560 0%, #C73E54 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
        }
        .submit-btn:disabled {
            background: #D1D5DB;
            box-shadow: none;
            cursor: not-allowed;
        }
        .submit-btn:not(:disabled):hover { transform: translateY(-2px); }

        /* Toast */
        .toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #1A1A2E; color: white; padding: 12px 20px; border-radius: 12px;
            opacity: 0; pointer-events: none; z-index: 200; font-size: 14px;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <!-- Main Container -->
    <div class="w-full max-w-md">
        
        <!-- Back Button -->
        <button onclick="goBack()" class="mb-4 flex items-center gap-2 text-muted hover:text-primary transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="text-sm font-medium">Back to Cart</span>
        </button>

        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-primary">Checkout</h1>
            <p class="text-sm text-muted mt-1">Enter your details to proceed.</p>
        </div>

        <!-- Form Card -->
        <div class="form-card fade-in">
            <form id="checkoutForm" onsubmit="handleSubmit(event)">
                
                <!-- Name -->
                <div class="input-group">
                    <label class="input-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your name" required>
                </div>

                <!-- Mobile Number -->
                <div class="input-group relative">
                    <label class="input-label">Mobile Number</label>
                    <input type="tel" id="mobile" class="form-input pr-24" placeholder="10-digit mobile number" maxlength="10" required oninput="validateMobile()">
                    <button type="button" id="sendOtpBtn" class="send-otp-btn" onclick="sendOTP()" disabled>Send OTP</button>
                </div>

                <!-- OTP Section (Hidden Initially) -->
                <div id="otpSection" class="input-group hidden">
                    <label class="input-label">Enter OTP</label>
                    <p class="text-xs text-muted mb-2 text-center">We've sent a 4-digit code to your number.</p>
                    <div class="otp-container">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 1)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 2)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 3)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 4)">
                    </div>
                    <!-- Hidden field to verify OTP status -->
                    <input type="hidden" id="otpVerified" value="false">
                </div>

                <!-- Email (Optional) -->
                <div class="input-group">
                    <label class="input-label">Email ID <span class="text-muted font-normal">(Optional)</span></label>
                    <input type="email" id="email" class="form-input" placeholder="example@gmail.com">
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="submit-btn" disabled>
                    Proceed to Payment
                </button>

            </form>
        </div>

        <!-- Secure Badge -->
        <div class="flex items-center justify-center gap-2 mt-6 text-xs text-muted">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            <span>100% Secure & Encrypted</span>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="toast">Message</div>

    <script>
        let isOtpSent = false;
        let generatedOtp = "1234"; // Dummy OTP for testing

        // Enable "Send OTP" button if mobile is 10 digits
        function validateMobile() {
            const mobile = document.getElementById('mobile').value;
            const btn = document.getElementById('sendOtpBtn');
            if (mobile.length === 10) {
                btn.disabled = false;
                btn.classList.add('bg-accent');
            } else {
                btn.disabled = true;
            }
        }

        // Send OTP Action
        function sendOTP() {
            const btn = document.getElementById('sendOtpBtn');
            btn.textContent = "Sent";
            btn.disabled = true;
            
            // Show OTP Section
            const otpSection = document.getElementById('otpSection');
            otpSection.classList.remove('hidden');
            
            // Animation
            gsap.fromTo(otpSection, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.5 });
            
            showToast(`OTP Sent! (Use: ${generatedOtp})`);
            isOtpSent = true;
        }

        // Auto move to next OTP input
        function moveToNext(current, index) {
            if (current.value.length === 1 && index < 4) {
                current.nextElementSibling.focus();
            }
            checkOtpComplete();
        }

        // Check if all OTP fields are filled
        function checkOtpComplete() {
            const inputs = document.querySelectorAll('.otp-input');
            let otp = "";
            inputs.forEach(input => otp += input.value);

            if (otp.length === 4) {
                if (otp === generatedOtp) {
                    document.getElementById('otpVerified').value = "true";
                    enableSubmitButton();
                    showToast('OTP Verified Successfully!');
                    
                    // Visual cue
                    inputs.forEach(input => {
                        input.style.borderColor = "#059669"; // Green border
                        input.style.background = "#ECFDF5";
                    });
                } else {
                    showToast('Incorrect OTP. Try 1234.');
                    document.getElementById('otpVerified').value = "false";
                }
            }
        }

        // Enable Final Submit Button Logic
        function enableSubmitButton() {
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const otpStatus = document.getElementById('otpVerified').value;

            const submitBtn = document.getElementById('submitBtn');

            if (name.length > 2 && mobile.length === 10 && otpStatus === "true") {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        // Listen for input changes to validate form
        document.getElementById('name').addEventListener('input', enableSubmitButton);
        document.getElementById('mobile').addEventListener('input', enableSubmitButton);

        // Handle Form Submit
        function handleSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            
            showToast('Redirecting to Payment Gateway...');
            
            // Save data temporarily if needed
            const userData = {
                name: name,
                mobile: mobile,
                email: document.getElementById('email').value
            };
            localStorage.setItem('userData', JSON.stringify(userData));

            // Redirect after delay
            setTimeout(() => {
                // window.location.href = 'payment.html';
                alert("Redirecting to Payment Gateway Page (Next Phase)");
            }, 1500);
        }

        function goBack() { window.history.back(); }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            gsap.timeline()
                .to(toast, { opacity: 1, y: -20, duration: 0.3 })
                .to(toast, { opacity: 0, y: 0, duration: 0.3, delay: 2 });
        }
        
        // Init Animations
        gsap.fromTo('.form-card', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' });
    </script>
</body>
</html>
