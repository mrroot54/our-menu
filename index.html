<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | Green Leaf Kitchen</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'premium': '#333333',
                        'muted': '#64748b',
                        'bg-main': '#FFFFFF',
                        'brand': '#14B8A6',
                        'brand-light': '#CCFBF1',
                        'brand-dark': '#0D9488',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'head': ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .fade-up { opacity: 0; transform: translateY(20px); }

        .slider-container { position: relative; overflow: hidden; }
        .slider-track { display: flex; }

        .menu-item-card {
            background-color: #FFFFFF;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid #F1F5F9;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
        }
        
        .menu-item-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }

        .img-zoom-container { overflow: hidden; border-radius: 12px; }
        .img-zoom-container img { transition: transform 0.6s ease; }
        .menu-item-card:hover .img-zoom-container img { transform: scale(1.05); }

        .filter-btn.active {
            background-color: #14B8A6;
            color: white;
            border-color: #14B8A6;
            box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
        }

        .page-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #E5E7EB;
            transition: all 0.2s;
        }
        .page-btn.active {
            background-color: #14B8A6;
            color: white;
            border-color: #14B8A6;
        }
        .page-btn:active { transform: scale(0.9); }

        .slider-btn {
            width: 36px; height: 36px;
            background: #14B8A6;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 20; border: none; color: white;
        }
        .slider-btn:active { transform: translateY(-50%) scale(0.95); background: #0D9488; }
        .slider-btn.left { left: 8px; }
        .slider-btn.right { right: 8px; }
    </style>
</head>

        <div id="searchOverlay" class="hidden absolute top-full left-0 right-0 bg-white border-b shadow-sm p-4">

    <!-- MAIN CONTENT -->

    </main>

            { id: 41, category_id: 4, name: "Cheesecake", desc: "Blueberry topping", price: "200", img: "https://images.unsplash.com/photo-1541783245831-57d6fb0926d3?auto=format&fit=crop&w=400", top: false },
            { id: 42, category_id: 4, name: "Pancakes", desc: "Maple syrup, butter", price: "180", img: "https://images.unsplash.com/photo-1517673400267-0251440c45dc?auto=format&fit=crop&w=400", top: false },
            { id: 43, category_id: 4, name: "Waffles", desc: "Honey, fruits", price: "180", img: "https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&w=400", top: false },
            { id: 44, category_id: 4, name: "Apple Pie", desc: "Warm, cinnamon", price: "170", img: "https://images.unsplash.com/photo-1541783245831-57d6fb0926d3?auto=format&fit=crop&w=400", top: false },
            { id: 45, category_id: 4, name: "Tiramisu", desc: "Coffee flavored", price: "210", img: "https://images.unsplash.com/photo-1517673400267-0251440c45dc?auto=format&fit=crop&w=400", top: false },
        ];

        // ==========================================
        // 🔨 DOM ELEMENTS
        // ==========================================
        const topPicksContainer = document.getElementById('topPicksContainer');
        const topPicksWrapper = document.getElementById('topPicksWrapper');
        const categoryFilters = document.getElementById('categoryFilters');
        const menuList = document.getElementById('menuList');
        const paginationContainer = document.getElementById('paginationContainer');
        const searchBtn = document.getElementById('searchBtn');
        const searchOverlay = document.getElementById('searchOverlay');
        const searchInput = document.getElementById('searchInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // --- STATE ---
        let currentFilter = 'all';
        let currentPage = 1;
        const itemsPerPage = 10;
        let sliderPosition = 0;
        let cardWidth = 160; 
        let totalCards = 0;

        // ==========================================
        // ⚡ INIT
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to(".fade-up", { opacity: 1, y: 0, duration: 0.8, stagger: 0.1, ease: "power2.out" });
            
            renderTopPicks();
            renderCategories();
            applyFilter('all');
            
            initEvents();
            initSlider();
        });

        // ==========================================
        // 🎠 SLIDER LOGIC
        // ==========================================
        function initSlider() {
            const cards = topPicksContainer.querySelectorAll('.pick-card');
            totalCards = cards.length;
            updateSliderButtons();
        }
        function slideNext() {
            const containerWidth = topPicksWrapper.offsetWidth;
            const maxScroll = (totalCards * cardWidth) - containerWidth;
            if (Math.abs(sliderPosition) < maxScroll) {
                sliderPosition -= cardWidth * 1;
                gsap.to(topPicksContainer, { x: sliderPosition, duration: 0.4, ease: "power2.out" });
            }
            updateSliderButtons();
        }
        function slidePrev() {
            if (sliderPosition < 0) {
                sliderPosition += cardWidth * 1;
                gsap.to(topPicksContainer, { x: sliderPosition, duration: 0.4, ease: "power2.out" });
            }
            updateSliderButtons();
        }
        function updateSliderButtons() {
            const containerWidth = topPicksWrapper.offsetWidth;
            const maxScroll = (totalCards * cardWidth) - containerWidth;
            if(sliderPosition >= 0) gsap.to(prevBtn, { autoAlpha: 0, duration: 0.2 });
            else gsap.to(prevBtn, { autoAlpha: 1, duration: 0.2 });
            if (Math.abs(sliderPosition) >= maxScroll - 10) gsap.to(nextBtn, { autoAlpha: 0, duration: 0.2 });
            else gsap.to(nextBtn, { autoAlpha: 1, duration: 0.2 });
        }

        // ==========================================
        // 🔨 RENDER FUNCTIONS
        // ==========================================
        
        function renderTopPicks() {
            const picks = menuItems.filter(i => i.top);
            topPicksContainer.innerHTML = '';
            picks.forEach(item => {
                const card = document.createElement('div');
                card.className = "pick-card flex-shrink-0 mr-4"; 
                card.innerHTML = `
                    <div class="w-36 rounded-2xl overflow-hidden bg-white shadow-sm border border-gray-100">
                        <div class="h-28 w-full overflow-hidden"><img src="${item.img}" class="w-full h-full object-cover"></div>
                        <div class="p-3">
                            <h4 class="text-sm font-semibold text-premium truncate">${item.name}</h4>
                            <p class="text-xs text-muted mt-0.5 mb-2">₹${item.price}</p>
                            <button class="w-full text-center text-xs font-semibold bg-brand text-white py-1.5 rounded-full">View</button>
                        </div>
                    </div>`;
                topPicksContainer.appendChild(card);
            });
        }

        function renderCategories() {
            categoryFilters.innerHTML = '';
            const allBtn = createFilterBtn('All', 'all');
            categoryFilters.appendChild(allBtn);
            categories.forEach(cat => {
                categoryFilters.appendChild(createFilterBtn(cat.name, cat.id));
            });
        }

        function createFilterBtn(name, id) {
            const btn = document.createElement('button');
            btn.className = `filter-btn px-4 py-2 text-xs font-medium border border-gray-200 rounded-full whitespace-nowrap transition-colors hover:border-brand text-premium ${id === currentFilter ? 'active' : ''}`;
            btn.textContent = name;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(id);
            });
            return btn;
        }

        // ==========================================
        // 🔄 FILTER & PAGINATION LOGIC
        // ==========================================
        
        function applyFilter(filterId) {
            currentFilter = filterId;
            currentPage = 1; 
            updateView();
        }

        function goToPage(pageNumber) {
            currentPage = pageNumber;
            updateView();
            window.scrollTo({ top: menuList.offsetTop - 80, behavior: 'smooth' });
        }

        function updateView() {
            let filteredItems = menuItems;
            if (currentFilter !== 'all') {
                filteredItems = menuItems.filter(i => i.category_id == currentFilter);
            }

            const totalItems = filteredItems.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredItems.slice(startIndex, endIndex);

            animateMenuRendering(paginatedItems);
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : 'bg-white text-premium hover:bg-gray-50'}`;
                btn.textContent = i;
                btn.addEventListener('click', () => goToPage(i));
                paginationContainer.appendChild(btn);
            }
        }

        // ==========================================
        // ⭐ VERY SLOW PREMIUM ANIMATION
        // ==========================================
        function animateMenuRendering(items) {
            // 1. Fade out existing items
            gsap.to("#menuList > div", {
                opacity: 0, 
                y: -10, 
                stagger: 0.02, 
                duration: 0.3, 
                ease: "power2.in",
                onComplete: () => {
                    // 2. Render new items
                    renderMenuItems(items);
                    
                    // 3. Very Slow Stagger In Animation
                    gsap.fromTo("#menuList > div", 
                        { 
                            opacity: 0, 
                            y: 50,      // Start further down
                            scale: 0.9  // Start smaller
                        }, 
                        { 
                            opacity: 1, 
                            y: 0, 
                            scale: 1,
                            stagger: 0.2,   // 200ms delay between items (Slow)
                            duration: 1,    // 1 second to animate (Slow & Smooth)
                            ease: "power3.out" 
                        }
                    );
                }
            });
        }

        // Render Items
        function renderMenuItems(items) {
            menuList.innerHTML = '';
            if (items.length === 0) {
                menuList.innerHTML = `<p class="text-center text-muted py-20 text-sm bg-gray-50 rounded-xl">No items found.</p>`;
                return;
            }
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = "menu-item-card";
                card.innerHTML = `
                    <div class="flex gap-4">
                        <div class="flex-1 flex flex-col justify-between min-h-[80px]">
                            <div>
                                <h3 class="text-sm font-semibold text-premium mb-1">${item.name}</h3>
                                <p class="text-xs text-muted leading-relaxed line-clamp-2">${item.desc}</p>
                            </div>
                            <div class="mt-2">
                                <span class="text-sm font-bold text-brand">₹${item.price}</span>
                            </div>
                        </div>
                        <div class="img-zoom-container w-20 h-20 bg-gray-50 flex-shrink-0 self-start">
                            <img src="${item.img}" class="w-full h-full object-cover">
                        </div>
                    </div>`;
                menuList.appendChild(card);
            });
        }

        // ==========================================
        // ⚙️ EVENTS
        // ==========================================
        function initEvents() {
            nextBtn.addEventListener('click', slideNext);
            prevBtn.addEventListener('click', slidePrev);

            searchBtn.addEventListener('click', () => {
                searchOverlay.classList.toggle('hidden');
                if(!searchOverlay.classList.contains('hidden')) searchInput.focus();
            });

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if(!term) { applyFilter(currentFilter); return; }
                
                const res = menuItems.filter(i => 
                    i.name.toLowerCase().includes(term) || 
                    i.desc.toLowerCase().includes(term)
                );
                
                currentPage = 1;
                animateMenuRendering(res.slice(0, 10)); 
                renderPagination(Math.ceil(res.length / itemsPerPage));
            });
        }
    </script>
</body>
</html>
